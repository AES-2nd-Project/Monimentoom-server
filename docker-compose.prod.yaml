# docker-compose.prod.yaml
services:
  app-blue:
    image: registry.gitlab.com/monimentoom-group/monimentoom-server:latest
    container_name: app-blue
    env_file: .env
    ports:
      - "8080:8080"
    networks:
      - app-network
    restart: unless-stopped

  app-green:
    image: registry.gitlab.com/monimentoom-group/monimentoom-server:latest
    container_name: app-green
    env_file: .env
    ports:
      - "8081:8080"
    networks:
      - app-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl/fullchain.pem:/etc/nginx/fullchain.pem
      - ./ssl/privkey.pem:/etc/nginx/privkey.pem
    networks:
      - app-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: mysql
    env_file: .env
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - app-network
    restart: unless-stopped

networks:
  app-network:
    driver: bridge

volumes:
  mysql-data: