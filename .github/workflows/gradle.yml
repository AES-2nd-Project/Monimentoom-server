name: Deploy Spring Boot to EC2

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 잡을 하나로 합쳐서 cicdtest.jar 파일 유지시키기
  build-and-deploy: 
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: application.yml 파일 설정
      run : |
        mkdir -p src/main/resources
        mkdir -p src/test/resources
        echo "${{secrets.APPLICATION_YML}}" > ./src/main/resources/application.yml
        echo "${{secrets.APPLICATION_YML}}" > ./src/test/resources/application.yml

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle Wrapper
      run: ./gradlew build

    - name: 빌드된 파일 이름 변경하기
      run: mv ./build/libs/*SNAPSHOT.jar ./cicdtest.jar

    - name: SCP로 EC2에 빌드된 파일 전송하기
      uses: appleboy/scp-action@master
      with:
        host: ${{secrets.SERVER_IP}}
        username: ${{secrets.SSH_USER}}
        key: ${{secrets.SSH_PRIVATE_KEY}}
        source: cicdtest.jar
        target: /home/ubuntu

    - name: SSH로 EC2에 접속 및 배포 실행
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP}}
        username: ${{secrets.SSH_USER}}
        key: ${{secrets.SSH_PRIVATE_KEY}}
        script_stop: true
        script: |
          sudo fuser -k 8080/tcp || true
          nohup java -jar /home/ubuntu/cicdtest.jar > /home/ubuntu/output.log 2>&1 &
