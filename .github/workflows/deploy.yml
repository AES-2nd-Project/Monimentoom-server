name: Deploy Spring Boot to EC2

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  # 잡을 하나로 합쳐서 cicdtest.jar 파일 유지시키기
  build-and-deploy: 
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: application.yml 파일 설정
      run : |
        mkdir -p src/main/resources
        mkdir -p src/test/resources
        echo "${{ secrets.APPLICATION_YML }}" > ./src/main/resources/application.yml
        echo "${{ secrets.APPLICATION_SECRET_YML }}" > ./src/main/resources/application-secret.yml

        echo "${{ secrets.TEST_APPLICATION_YML }}" > ./src/test/resources/application.yml    
        
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew
    # 1. jar 파일 만들기(Dockerfile에서 사용)
    - name: Build with Gradle Wrapper
      run: ./gradlew build
    # 2. 도커허브 로그인
    - name: 도커허브 로그인
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    # 3. Docker 이미지 빌드 및 푸시 (파일전송 방식에서 변경)
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/monimentoom-spring:latest

    # 4. EC2에 접속해서 명령어만 내림
    - name: SSH로 EC2에 접속 및 배포 실행
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP}}
        username: ${{secrets.SSH_USER}}
        key: ${{secrets.SSH_PRIVATE_KEY}}
        script_stop: true
        # cicdtest.jar를 직접실행하기에서 docker compose 실행하도록 바꿈
        script: |
          cd /home/ubuntu
          # 최신 이미지 내려받기
          docker-compose pull
          # 컨테이너 재시작 (새 이미지 적용)
          docker-compose up -d
          # 미사용 이미지 정리 (용량 확보)
          docker image prune -f
