spring:
  datasource:
    url: jdbc:mysql://${EC2_HOST}:3306/monimentoom?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${MYSQL_USERNAME_EC2}
    password: ${MYSQL_PASSWORD_EC2}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true