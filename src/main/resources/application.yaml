spring:

  # application-secret.yaml 파일을 포함하여 환경변수로부터 설정값을 불러오기
  profiles:
    include: secret

  jpa:
    hibernate:
      ddl-auto: update
#     ddl-auto: validate # Flyway를 쓰므로 validate나 none으로 설정
    show-sql: true
    properties:
      hibernate:
        format_sql: true


  flyway:
    enabled: false  # 어느정도 DB 설계 후 true로 변경하여 DB 동기화하기
    baseline-on-migrate: true
    locations: classpath:db/migration



server:
  port: 8080