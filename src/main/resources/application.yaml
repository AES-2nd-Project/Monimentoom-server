spring:
  # application-secret.yaml 파일을 포함하여 환경변수로부터 설정값을 불러오기
  profiles:
    include: secret

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
#     ddl-auto: validate # Flyway를 쓰므로 validate나 none으로 설정
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false  # 어느정도 DB 설계 후 true로 변경하여 DB 동기화하기
    baseline-on-migrate: true
    locations: classpath:db/migration

# AWS S3
cloud:
  aws:
    credentials:
      access-key: ${AWS_ACCESS_KEY}
      secret-key: ${AWS_SECRET_KEY}
    region:
      static: ${AWS_REGION}
    s3:
      bucket: ${S3_BUCKET_NAME}
    stack:
      auto: false


server:
  port: 8080
  forward-headers-strategy: native # Nginx 뒤에서 실행할 때 클라이언트 IP 주소를 올바르게 전달하기 위해 설정